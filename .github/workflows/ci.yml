name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Python syntax
        run: python3 -m py_compile api/server.py api/test_server.py
      - name: Run unit tests
        run: python3 -m unittest api/test_server.py
